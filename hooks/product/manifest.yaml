# Hook registration manifest — Product Module
#
# Auto-read by /ecosystem:bootstrap Step 6b to register hooks in
# <project>/.claude/settings.json.
#
# Schema:
#   version: <int>                     # manifest format version (currently 1)
#   module: <string>                   # identifier, e.g., "product", "design", "integrator"
#   hooks: [ ... ]                     # list of hook registrations
#     - id: <string>                   # unique within module (no spaces, kebab-case)
#       file: <filename>               # file in this same directory
#       events:                        # can register same file under multiple events
#         - type: <event-name>         # PostToolUse | PreToolUse | UserPromptSubmit | Stop | SessionStart | SessionEnd | PreCompact | Notification | SubagentStop
#           matcher: <string>          # tool name regex, or "" for event types without tools
#       description: <string>          # human-readable purpose
#       enabled_when: <string>         # optional: "always" | "has_ui" | ...; default "always"
#
# How bootstrap processes this:
#   1. Read all hooks/*/manifest.yaml files
#   2. Group hook commands by (event, matcher) pair
#   3. Merge into existing .claude/settings.json hooks (preserves user-added entries)
#   4. Write merged hooks back to settings.json
#
# To add a new hook to an existing module: add entry here + drop the .js file
# alongside. Re-run /ecosystem:bootstrap (which is idempotent) or /ecosystem:verify
# will detect missing registration and offer to fix.

version: 1
module: product

hooks:
  - id: artifact-validate
    file: artifact-validate.js
    events:
      - type: PostToolUse
        matcher: "Write|Edit"
    description: "Inline validation of .product/ artifact files per validation.md catalog. Tier-aware (B1 modification): pilot shows only 🔴 Blocking; mvp adds 🟡 Warning; full shows all. Quiet-draft-mode (B2): findings queued when artifact status=draft, surfaced on approve. Phase 3.F D2 overrides: validation_overrides + approve_overrides parsed; overridden findings logged со status: overridden в .pending/validation-pending.yaml для audit trail."

  - id: session-state
    file: session-state.js
    events:
      - type: PostToolUse
        matcher: "Write|Edit"
    description: "Snapshots .product/.sessions/current.yaml on .product/ artifact changes. Enables /product:<command> --continue recovery after session interrupt."

  - id: bg-extractor
    file: bg-extractor.js
    events:
      - type: PostToolUse
        matcher: "Write|Edit"
    description: "Phase 1 of BG extraction algorithm (per processes.md §5). Scans bold terms (markdown bold patterns) in .product/ artifact files; filters via stoplist (RU+EN function words + technical terms); dedupes against existing BG (glossary.md) + rejected list; appends candidates к .product/.pending/bg-candidates.yaml. Phases 2-4 handled by /product:bg-review command + bg-extraction.md skill."

  - id: cascade-check
    file: cascade-check.js
    events:
      - type: PostToolUse
        matcher: "Write|Edit"
    description: "Cascade detection + V-11 (bi-dir refs) auto-fix per DEC-DEV-0012 C.4. Identifies dependents through bi-dir refs; V-11 auto-fixes inline if target active (skip on draft per DEC-DEV-0013 #3 quiet-draft consistency); other rules queue к .product/.pending/cascade-pending.yaml для manual review via /product:cascade. Trigger matrix per processes.md §4.1 (D2-Behavioral focus в v1). Full BFS auto-fix beyond V-11 deferred v1.1."

  - id: br-change-trigger
    file: br-change-trigger.js
    events:
      - type: PostToolUse
        matcher: "Write|Edit"
    description: "P-RULE-02 enforcement per adaptive-depth model (DEC-DEV-0012 + DEC-DEV-0013 #8). Filters internally к .product/business-rules/*.md only. Detects BR change → captures git diff против HEAD (best-effort) → appends entry к .product/.pending/da-pending.yaml с Mode: adaptive → stderr signal для orchestrator. Orchestrator (feature-session.md skill) reads stderr → spawns product-devils-advocate subagent с adaptive brief через Agent tool. Hook не вызывает subagent сам."

  - id: ic-change-trigger
    file: ic-change-trigger.js
    events:
      - type: PostToolUse
        matcher: "Write|Edit"
    description: "P-RULE-01 enforcement per adaptive-depth model (DEC-DEV-0012 + DEC-DEV-0013 #8). Filters internally к .product/invariants/*.md only. Symmetric к br-change-trigger.js (same pattern, different artifact directory). Includes severity field в pending entry для subagent context. Stderr signal для orchestrator."

  - id: product-handoff-gate
    file: product-handoff-gate.js
    events:
      - type: PostToolUse
        matcher: "Write|Edit"
    description: "Handoff drift detection per V-H-04 (handoff-spec §10). Scans .product/handoffs/*.md after .product/ artifact saves; если edited artifact appears в handoff artifact_hashes — recomputes current hash через hooks/product/lib/hash.js (DEC-DEV-0025 C.1 + DEC-DEV-0030 contract: body markdown без frontmatter, LF-normalized, SHA-256, sha256:<hex64>). Mismatch → stderr warning suggesting /product:handoff <FM-id> --regenerate. Non-blocking — informs про staleness only (V-H-04 declared Warning level, не Blocking; aligns с CLAUDE.md «Hook never blocks»). Phase 4.F deliverable."

  - id: lesson-gate
    file: lesson-gate.js
    events:
      - type: Stop
        matcher: ""
    description: "LESSON-* non-deferrability gate (PRONG A, Stop). Per DEC-DEV-0062. The FIRST blocking hook in the ecosystem — a DELIBERATE, DEC-DEV-authorized departure from the «Hook never blocks» convention, scoped to corrective lessons only. Refuses a clean session close while any .product/lessons/LESSON-*.md is status:open OR mid-write-truncated (open frontmatter fence без closing fence). Blocking contract verified against code.claude.com/docs/en/hooks (Stop exit 2 blocks; stderr fed back to Claude; platform-independent; auto-overridden after 8 consecutive blocks). Default strict (exit 2); env LESSON_GATE_MODE=warn downgrades to advisory stderr, =off silences. Fail-open on any parse/fs error; stop_hook_active re-entrancy guard. No-op if no .product/ dir."

  - id: lesson-presence-gate
    file: lesson-presence-gate.js
    events:
      - type: PreToolUse
        matcher: "Write|Edit|Bash|NotebookEdit"
      - type: UserPromptSubmit
        matcher: ""
    description: "LESSON-* non-deferrability backstop (PRONG B). Per DEC-DEV-0062. Closes the «session never ends → Stop never fires» hole. SHIPS DEFAULTED TO STRICT (flipped 2026-07-11, owner decision after S-LE re-run PASS of the DEC-DEV-0143 carve-out — smoke-batch DEC-DEV-0177; downgrade escape: LESSON_GATE_MODE=warn): PreToolUse denies a mutating tool call via hookSpecificOutput.permissionDecision=deny (contract per code.claude.com/docs/en/hooks), WITH target carve-out (isLessonResolutionTarget: writes to .product/lessons/** and the lesson-in-progress marker always allowed — avoids self-deadlock, live-validated 2026-07-11) + fresh-marker exemption (an active /product:lesson protocol is not denied). UserPromptSubmit re-surfaces open lessons every turn via additionalContext (never blocks a prompt). warn mode = stderr nag only. Fail-open on any error; no-op if no .product/ dir."

  - id: zone-change-trigger
    file: zone-change-trigger.js
    events:
      - type: PostToolUse
        matcher: "Write|Edit"
    description: "Zone→profile-persona router for the Autonomous Pipeline completeness-loop (DEC-DEV-0098, Epic A / A2). Filters internally to .product/ artifacts; matches the changed file to a zone via zone-router.cjs + zone-routing.yaml; computes git diff against HEAD (best-effort) → deterministic magnitude (cosmetic vs significant). When a persona fires (zone matched AND magnitude >= threshold) → appends/updates .product/.pending/advisor-pending.yaml (dedup by artifact id — idempotent re-run per LOOP_READINESS_AUDIT §5.3) + stderr signal so the orchestrating skill spawns each heterogeneous persona (architect-advisor/qa-advisor/ux-advisor) as its canonical subagent_type (not-found = STOP, never general-purpose fallback). Magnitude gate keeps the panel off trivial edits (Epic A anti-token-burn rail). Hook does not spawn a subagent itself — only signals (same contract as br/ic-change-trigger). Non-blocking, exit 0 always; fail-open if the router is unavailable."

  - id: subagent-watchdog
    file: subagent-watchdog.js
    events:
      - type: SubagentStop
        matcher: ""
      - type: Stop
        matcher: ""
      - type: PostToolUse
        matcher: "Write|Edit"
    description: "Deterministic watchdog over the pending-review queues + canonical persona spawns (DEC-DEV-0159; closes audit gaps G05/G06). SubagentStop: a canonical persona (product-devils-advocate / architect-advisor / qa-advisor / ux-advisor) finishing records consumption of the artifact ids from its spawn prompt into the sidecar .product/.pending/.watchdog-state.json (producer yamls never mutated — their formatters whitelist fields); a persona/DA brief that ran under general-purpose/claude → loud stderr S8 P1 regression warning (review NOT valid, respawn canonical, G06). Stop: unconsumed pending entries at session close → stderr reminder (spawn-intent dies with the session, queue does not — G05). PostToolUse (Write|Edit on da/advisor-pending.yaml): entry disappeared without recorded consumption → loud stderr (incident class 1ff552c0c6b4 / DEC-DEV-0038 #1). Warn-only (exit 0 always — lesson-gate stays the only blocking hook), fail-open, env SUBAGENT_WATCHDOG=0 silences. First SubagentStop hook in the ecosystem."

  - id: worktree-enter-guard
    file: worktree-enter-guard.js
    events:
      - type: PreToolUse
        matcher: "EnterWorktree"
    description: "Pre-flight advisory before entering a git worktree. Upstreamed from the my-first-test pilot per DEC-DEV-0065 (pilot↔ecosystem reconciliation, step 1). Runs worktree-preflight.js (same dir) from the main checkout via spawnSync, where gitignored per-checkout state is still visible, and surfaces hazards that won't follow into the worktree: non-empty .product/.pending/ queues, fresh .sessions/current.yaml + git_head_sha drift, beads in_progress (the only cross-checkout coordination signal — OQ-PM-02 concurrent-session-detection is unimplemented), and shared gitignored resources (.env, .design-sessions/, integrator/secrets/). Warn-only — emits report to stderr AND injects PreToolUse additionalContext with permissionDecision=allow; exit 0 always (never blocks; aligns с CLAUDE.md «Hook never blocks»). Helper worktree-preflight.js also runnable standalone (--strict exits 1 on warnings; --json)."
