# Vertical pack: ai-tools — Stage A v0.2 (2026-07-11)
# ГЕО-ФОКУС: Россия. EN-источники = сырьё для стратегий переноса (S1 гео-лаг,
# S5 импортозамещение); RU-источники = прямой спрос-сигнал + RU-присутствие-чек.
#
# Источники — КАНДИДАТЫ: доступность/ToS верифицируются на первом прогоне.
# Упавшая/недоступная lane НЕ выбрасывается молча — раскрывается в дайджесте
# (принцип CONCEPT.md §4.6 «никаких молчаливых срезов»).

vertical: ai-tools
markets: [ru-primary, en-as-transfer-source]

# Стратегии поиска (CONCEPT.md §3.6): включённость + веса для скоринга тезисов.
strategies:
  S1-geo-lag:            { enabled: true, weight: 1.0 }   # тренд в US → РФ через 1-3 года
  S5-import-substitution: { enabled: true, weight: 1.0 }   # vendor-exit → замещающий спрос
  S2-pay-and-complain:   { enabled: true, weight: 0.8 }
  S3-catalyst-window:    { enabled: true, weight: 0.6 }
  S7-picks-and-shovels:  { enabled: true, weight: 0.5 }
  S4-under-radar:        { enabled: true, weight: 0.4 }
  S6-unbundling:         { enabled: true, weight: 0.3 }

terms_of_art:
  en:
    - "AI coding assistant"
    - "agentic workflow / agent orchestration"
    - "LLM ops / LLM observability"
    - "eval harness / LLM evals"
    - "context engineering"
    - "MCP server"
    - "RAG pipeline"
  ru:
    - "ИИ-ассистент разработчика"
    - "агентные системы / ИИ-агенты"
    - "LLM-пайплайн / внедрение LLM"
    - "автоматизация разработки через ИИ"
    - "импортозамещение ПО"
    - "нейросети для бизнеса"

thresholds:
  realism_confirmed_min_corroboration: 2   # confirmed = ≥2 независимых источника
  signal_min_repeats: 3                    # жалоба = сигнал от ≥3 независимых повторов
  digest_reading_budget_minutes: 10

# Lanes сканирования. tier = сила сигнала (CONCEPT.md §3 L1);
# feeds = какие стратегии кормит lane.
lanes:
  - id: ru-demand
    tier: S
    feeds: [S2, S5, S6]
    title: "RU прямой спрос: жалобы, костыли, existing spend"
    method: websearch
    sources:
      - "Habr (хабы ИИ/ML/DevOps): статьи-боли и КОММЕНТАРИИ — жалобы, костыли, 'сделали свой велосипед'"
      - "vc.ru (ИИ/стартапы/сервисы): жалобы на инструменты, обзоры 'чем заменить X'"
      - "Отзывы на русскоязычные ИИ-сервисы и SaaS (otzovik/irecommend для B2C, тендерные и корпоративные обзоры для B2B)"
      - "Поиск: 'как заменить <западный инструмент>', 'аналог <X> в России', 'не работает в России'"
    hints: >
      Existing spend и костыли (Excel-склейки, самописные скрипты, ручной труд,
      'наняли человека под это') — сигнал сильнее жалобы. Фиксировать цитаты + URL + дату.

  - id: ru-import-substitution
    tier: A
    feeds: [S5, S3]
    title: "RU импортозамещение: vendor-exit, реестры, корпоративный спрос"
    method: websearch
    sources:
      - "Списки ушедших/ограничивших работу в РФ вендоров ПО × категории ai-tools: кто ушёл, чем заменяют, на что жалуются в заменах"
      - "Реестр отечественного ПО (категории ИИ/разработка): что уже есть, где дыры"
      - "Корпоративные требования: локализация данных (152-ФЗ), отраслевые стандарты — что порождает спрос на локальные ИИ-инструменты"
      - "Госзакупки/тендеры на ИИ-решения и инструменты разработки (zakupki.gov.ru — открытые данные)"
    hints: >
      Рынок обучен продуктом-оригиналом = CAC ниже. Проверять: платёжеспособность
      сегмента, горизонт возврата вендора, есть ли уже сильный локальный клон.

  - id: geo-lag-us-trends
    tier: A
    feeds: [S1, S7]
    title: "Гео-лаг: US/EN тренды с устойчивым revenue → RU-присутствие-чек"
    method: websearch
    sources:
      - "US/EN категории ai-tools с ростом revenue/funding ≥12 мес (не разовый хайп): G2-категории с растущим числом платящих, funding-волны, YC-батчи"
      - "Acquire.com / Flippa: категории AI-SaaS со СТАБИЛЬНОЙ revenue — что доказало деньги на малом масштабе"
      - "Для каждого кандидата — RU-присутствие-чек: есть ли аналог в РФ, качество, цены, жалобы на аналог"
    hints: >
      Двухшаговый контракт lane: (1) кандидат = категория с ДОКАЗАННЫМИ деньгами
      в US (revenue-факты, не хайп-анонсы); (2) RU-чек: empty | weak-analogs |
      strong-analogs + локализационные барьеры (платёжеспособность, регуляторика,
      платежи, каналы). Кандидаты strong-analogs — drop.

  - id: en-demand-reviews
    tier: S
    feeds: [S2, S1, S6]
    title: "EN платят-и-недовольны (как сырьё для переноса)"
    method: websearch
    sources:
      - "G2 / Capterra: AI code assistants, LLM observability, AI agents — отзывы 1-2 звезды"
      - "Reddit (r/LocalLLaMA, r/ChatGPTCoding, r/devops): 'frustrating', 'workaround', 'why is X so bad'"
      - "Hacker News: треды-жалобы на AI-тулинг"
    hints: >
      EN-боль сама по себе тезис НЕ порождает (гео-фокус — РФ); она порождает
      кандидата S1/S6 ЕСЛИ боль универсальна и в РФ ниша пуста — обязателен RU-чек.

  - id: catalysts
    tier: B
    feeds: [S3, S1]
    title: "Катализаторы why-now: релизы, цены, регуляторика (EN + RU)"
    method: websearch
    sources:
      - "Релизы моделей/API и изменения цен, вкл. доступность в РФ (ВСЕГДА метить vendor/T3)"
      - "RU-регуляторика ИИ и данных: что порождает спрос на локальные решения"
      - "Кривые издержек: что стало в 10x дешевле за 12 мес"
    hints: "Катализатор ценен только в паре с сигналом спроса из S/A lanes."

  - id: supply-frontier
    tier: C
    feeds: [S4, S7, S1]
    title: "Supply-side и фронтир (EN + RU)"
    method: websearch
    sources:
      - "Product Hunt (AI-категории): что запускают, что взлетает/проваливается"
      - "IndieHackers: revenue-прозрачные AI-продукты"
      - "Show HN, GitHub trending: ранние инструменты"
      - "RU: запуски на vc.ru/Habr, продуктовые каналы — что запускают локально"
    hints: "Ищем gaps: что запускают массово (перегрето) vs что просят и никто не делает."

# Tier-P (проприетарный вход владельца) — НЕ lane воронки:
# наблюдения кладутся руками в stage-a/inbox/tier-p/ и подмешиваются
# в Synthesize-фазу как отдельный высокоприоритетный вход.
