# Process Catalog — Ecosystem 3.0 (DEC-DEV-0153, 2026-07-07)
#
# СНАПШОТ-РЕЕСТР процессов экосистемы: иерархия домен→процесс→шаг, детерминизм-классы,
# события-исходы и межпроцессные связи с фактической надёжностью механизма.
# НЕ SSOT шагов (SSOT остаются processes.md / orchestrator SPEC / командные файлы /
# process-graph.overlay.json) — это координационный реестр под Process Fabric (charters).
# Источник: 4 доменных генератора аудит-волны (structured output), курирование main-сессией:
#   - оркестраторная серия переименована P1..P7 → P1o..P7o (канон process-graph.overlay.json;
#     снимает коллизию с продуктовыми P4=cascade / P5=periodic);
#   - дубли слиты (PATCH-cut→patch-cut, MEMORY-sync→memory-sync);
#   - кросс-ссылки нормализованы alias-таблицей; цели вне каталога помечены external: true
#     (модули/роли/артефакты/скрипты — легитимные не-процессные адресаты).
#
# Шкала детерминизма (CONCEPT.md §7):
#   DL0 — детерминированный скрипт; DL1 — процедурный LLM (точный бриф);
#   DL2 — judgment LLM (ревью/классификация); DL3 — творческий LLM (авторинг/discovery);
#   H — человеческое решение (approve/merge/floor).
# origin: existing (канонический ID сохранён) | gap-fill (из методологии, под реальный разрыв).
# reliability связей: enforced | prompted | human-memory | missing | proposed (gap-fill).

meta:
  generated: "2026-07-07"
  total_processes: 94
  external_link_targets: ["OD8-product", "artifact-catalog", "changelog-consumer", "consilium-synth.cjs", "coverage-oracle.cjs", "deep-research", "gate-risk-classifier", "main-branch-merge", "process-triggers-CLAUDE", "prod-deploy-op", "session-close", "workflow-agent-spawn", "workflow-syntax-smoke"]

